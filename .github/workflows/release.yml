name: Release

# Owns deployment for this GitHub Action. flipbook-cli's own Release workflow
# publishes its plugin to the Roblox Creator Store at this stage; the equivalent
# "deploy" for an action is making the new release consumable, so when a drafted
# release is published we move the major-version pointer tag (e.g. `v1`) to the
# released commit. Consumers pinning `uses: flipbook-labs/deploy-storybook@v1`
# then pick up the latest v1.x.y without changing their workflows.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to point the major version at (e.g. v1.2.3)
        required: false

jobs:
  move-major-tag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Skip prereleases: only stable releases should advance the major pointer.
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.release.prerelease }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Move major version pointer tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail

          tag="$RELEASE_TAG"
          if [ -z "$tag" ]; then
            echo "No release tag provided; nothing to do." >&2
            exit 1
          fi

          # Only advance the pointer for vMAJOR.MINOR.PATCH tags.
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag '$tag' is not a vMAJOR.MINOR.PATCH tag; nothing to do."
            exit 0
          fi

          major="${tag%%.*}"            # v1.2.3 -> v1
          sha="$(git rev-list -n 1 "$tag")"

          echo "Pointing $major at $sha (from $tag)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Force-update the lightweight major tag locally and on origin so it
          # always tracks the latest release for that major version.
          git tag -f "$major" "$sha"
          git push --force origin "refs/tags/$major"
