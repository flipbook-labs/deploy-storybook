name: Release

# Owns the entire release lifecycle for this GitHub Action, in two phases:
#
#   1. Readiness (release): changewrite handles the full cycle — gate, draft,
#      publish, and the version-bump PR — in a single job.
#   2. Deployment (move-major-tag): once a release is published, move the
#      major-version pointer tag (e.g. `v1`) to the released commit so consumers
#      pinning `uses: flipbook-labs/deploy-storybook@v1` pick up the latest
#      v1.x.y without changing their workflows.
#
# The release job must authenticate with the GitHub App token (not GITHUB_TOKEN)
# for two reasons:
#   - Publishing the release via the App token emits the `release: published`
#     event that re-triggers this workflow into phase 2. GITHUB_TOKEN publishes
#     do not emit events that start other workflow runs.
#   - The version-bump PR must be opened as the App so its push triggers CI;
#     PRs created by GITHUB_TOKEN do not trigger other workflow runs.

on:
  push:
    branches: [main]
  # The release job sits out regular PRs; label a PR `debug:release-pr` to
  # force it to run in `prepare-only` mode and open a throwaway debug PR for
  # inspecting changelog / version regeneration. The `labeled` type makes
  # adding the label re-trigger.
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  # Phase 2 entry point: a published release advances the major-version pointer.
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      force_publish:
        description: Tag and create draft release from version on `main`
        type: boolean
        default: false
      tag:
        # Setting this runs ONLY the deploy phase (move-major-tag); the readiness
        # pipeline sits out a deploy-only dispatch.
        description: Release tag to point the major version at (e.g. v1.2.3)
        required: false

jobs:
  release:
    # The readiness pipeline runs for pushes, labeled PRs, and a force_publish
    # dispatch. It sits out the `release: published` event and a deploy-only
    # dispatch (`tag` set), both of which only drive move-major-tag below.
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'debug:release-pr')) ||
      (github.event_name == 'workflow_dispatch' && inputs.tag == '')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-pr-${{ github.ref }}
      cancel-in-progress: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.FLIPBOOK_BACKEND_APP_ID }}
          private-key: ${{ secrets.FLIPBOOK_BACKEND_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          ref: main

      - uses: flipbook-labs/changewrite@v0.2.0
        with:
          # Use the App token so publishing fires `release: published` → move-major-tag,
          # and so the version-bump PR triggers CI when pushed. pr-token defaults to
          # github-token when omitted, so no separate pr-token is needed here.
          github-token: ${{ steps.app-token.outputs.token }}
          force-publish: ${{ inputs.force_publish || false }}
          base: main
          branch: ${{ github.event_name == 'pull_request' && 'debug-publish-next-version' || 'publish-next-version' }}
          prepare-only: ${{ github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'debug:release-pr') }}
          pr-title: ${{ github.event_name == 'pull_request' && '[DEBUG] Publish v{{version}}' || 'Publish v{{version}}' }}
          pr-body: |
            >[!IMPORTANT]
            > This PR prepares the next release by bumping the version and updating the changelog.
            >
            > **Merging this PR will:**
            >
            > 1. Create and push tag `{{tag}}`
            > 2. Create a GitHub release for that tag and publish it
            > 3. Move the major-version pointer tag (e.g. `{{tag}}` -> `v<major>`) so consumers pinning `@v<major>` pick up the release

            <details>
            <summary><b>GitHub Release preview</b></summary>

            # {{tag}}

            **github-actions** released this 0 seconds ago 🔒 Immutable 🏷️ {{tag}} 🔗 SHA

            {{notes}}
            </details>

            Next release will be available here:
            {{repo_url}}/releases/tag/{{tag}}

            🤖 This PR was generated by [this run]({{run_url}}).

  move-major-tag:
    # Deploy phase: advance the major-version pointer tag (e.g. `v1`) to the
    # released commit. Runs when a release is published (the release job above
    # fires this via the App token) and, for manual recovery, on a
    # workflow_dispatch that supplies `tag`. Skips prereleases: only stable
    # releases should advance the major pointer.
    if: >-
      (github.event_name == 'release' && !github.event.release.prerelease) ||
      (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Move major version pointer tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail

          tag="$RELEASE_TAG"
          if [ -z "$tag" ]; then
            echo "No release tag provided; nothing to do." >&2
            exit 1
          fi

          # Only advance the pointer for vMAJOR.MINOR.PATCH tags.
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag '$tag' is not a vMAJOR.MINOR.PATCH tag; nothing to do."
            exit 0
          fi

          major="${tag%%.*}"            # v1.2.3 -> v1
          sha="$(git rev-list -n 1 "$tag")"

          echo "Pointing $major at $sha (from $tag)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Force-update the lightweight major tag locally and on origin so it
          # always tracks the latest release for that major version.
          git tag -f "$major" "$sha"
          git push --force origin "refs/tags/$major"
