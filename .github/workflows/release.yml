name: Release

# Owns the entire release lifecycle for this GitHub Action, in two phases:
#
#   1. Readiness (gate -> publish-release -> prepare-release-pr): decide whether
#      to publish, tag + draft + publish the release, and open the
#      auto-generated publish PR.
#   2. Deployment (move-major-tag): once a release is published, move the
#      major-version pointer tag (e.g. `v1`) to the released commit so consumers
#      pinning `uses: flipbook-labs/deploy-storybook@v1` pick up the latest
#      v1.x.y without changing their workflows.
#
# The readiness phase lives in the `flipbook-cli release` subcommands (gate,
# draft, prepare-pr). We consume flipbook-cli as a Rokit tool (see rokit.toml)
# and call it directly. Phase 1 publishes the release with the GitHub App token,
# which emits the `release: published` event that re-triggers this workflow into
# phase 2 (see the publish-release notes below for why the App token matters).
#
# Unlike flipbook-cli's own workflow, this repo ships a GitHub Action consumed
# straight from the repo at a git ref, so there is no binary to build or artifact
# to attach: the `build` and `attach` jobs drop out, and the only build-time
# artifact is the source already in the repo.

on:
  push:
    branches: [main]
  # Run the read-only `gate` job on PRs as well, so changes to this workflow (or
  # to anything it depends on) are exercised before they land. The side-effecting
  # jobs below are guarded with `github.event_name != 'pull_request'`, so by
  # default a PR can never tag, draft a release, or touch the real publish PR.
  #
  # Escape hatch: label a PR `debug:release-pr` to force `prepare-release-pr` to
  # run and open a *throwaway* debug PR (see that job) for debugging changelog /
  # version regeneration. The `labeled` type makes adding the label re-trigger.
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  # Phase 2 entry point: a published release advances the major-version pointer.
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      force_publish:
        description: Tag and create draft release from version on `main`
        type: boolean
        default: false
      tag:
        # Setting this runs ONLY the deploy phase (move-major-tag); the readiness
        # pipeline sits out a deploy-only dispatch.
        description: Release tag to point the major version at (e.g. v1.2.3)
        required: false

jobs:
  gate:
    # The readiness pipeline (gate -> publish-release -> prepare-release-pr) runs
    # for pushes, PRs, and a force_publish dispatch. It sits out the
    # `release: published` event and a deploy-only dispatch (`tag` set), both of
    # which only drive move-major-tag below.
    if: >-
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && inputs.tag == '')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      has_changes: ${{ steps.eval.outputs.has_changes }}
      should_publish: ${{ steps.eval.outputs.should_publish }}
      version: ${{ steps.eval.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: CompeyDev/setup-rokit@1d9390883f7ebce19d48f5b8d006e11d387c92ab # v0.2.1
        with:
          version: v1.2.0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Evaluate release action
        id: eval
        run: |
          set -euo pipefail
          result="$(flipbook-cli release gate ${{ inputs.force_publish && '--force-publish' || '' }})"
          echo "$result"
          jq -r 'to_entries[] | "\(.key)=\(.value)"' <<< "$result" >> "$GITHUB_OUTPUT"

  publish-release:
    needs: gate
    if: github.event_name != 'pull_request' && needs.gate.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.FLIPBOOK_BACKEND_APP_ID }}
          private-key: ${{ secrets.FLIPBOOK_BACKEND_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: CompeyDev/setup-rokit@1d9390883f7ebce19d48f5b8d006e11d387c92ab # v0.2.1
        with:
          version: v1.2.0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and draft release
        run: flipbook-cli release draft --version "${{ needs.gate.outputs.version }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # This repo attaches no artifacts to its releases, so there is nothing to
      # wait for between drafting and publishing: take the release live in the
      # same job.
      #
      # Publish with the GitHub App token, NOT GITHUB_TOKEN. A release published
      # via GITHUB_TOKEN does not emit events that start other workflow runs, so
      # the `release: published` event that the move-major-tag job below listens
      # for would never fire. The App token is a separate identity, so its
      # published event does re-trigger this workflow into the deploy phase.
      - name: Publish release
        run: flipbook-cli release publish --tag "v${{ needs.gate.outputs.version }}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

  prepare-release-pr:
    needs: [gate, publish-release]
    if: |
      always() &&
      needs.gate.result == 'success' &&
      (
        (
          github.event_name != 'pull_request' &&
          (
            (needs.gate.outputs.has_changes == 'true' && needs.gate.outputs.should_publish != 'true') ||
            (needs.gate.outputs.should_publish == 'true' && needs.publish-release.result == 'success')
          )
        ) ||
        (
          github.event_name == 'pull_request' &&
          contains(github.event.pull_request.labels.*.name, 'debug:release-pr')
        )
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-pr-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.FLIPBOOK_BACKEND_APP_ID }}
          private-key: ${{ secrets.FLIPBOOK_BACKEND_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          # On a debug PR run, check out the PR's own branch so the regeneration
          # runs against this PR's content (the debug PR then previews the publish
          # PR as it would look once this PR merges).
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref }}

      # `release prepare-pr` shells out to git-cliff to regenerate the changelog,
      # which Rokit provides.
      - uses: CompeyDev/setup-rokit@1d9390883f7ebce19d48f5b8d006e11d387c92ab # v0.2.1
        with:
          version: v1.2.0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare release changes
        id: prepare
        run: |
          set -euo pipefail
          result="$(flipbook-cli release prepare-pr)"
          echo "$result"
          # `release prepare-pr` shells out to git-cliff, whose command echo lands
          # on stdout ahead of the JSON result; keep only the final JSON line.
          jq -r 'to_entries[] | "\(.key)=\(.value)"' <<< "$(tail -n1 <<< "$result")" >> "$GITHUB_OUTPUT"

      # Preview the release this PR will produce, rendered by the same command
      # that will populate the real release notes (`release notes` shares its
      # renderer with `release draft`), so the preview can't drift. The tag does
      # not exist yet here, so it renders the not-yet-released commits.
      - name: Render release notes preview
        id: notes
        run: |
          set -euo pipefail
          {
            echo 'body<<__RELEASE_NOTES_EOF__'
            flipbook-cli release notes --version "${{ steps.prepare.outputs.version }}"
            echo '__RELEASE_NOTES_EOF__'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update publish PR
        if: github.event_name != 'pull_request'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          # Push as the GitHub App rather than the default GITHUB_TOKEN so the
          # branch push triggers CI on the publish PR. Pushes made with
          # GITHUB_TOKEN do not trigger further workflow runs.
          # Read more: https://docs.github.com/en/actions/writing-workflows/choosing-when-your-workflow-runs/triggering-a-workflow#triggering-a-workflow-from-a-workflow
          token: ${{ steps.app-token.outputs.token }}
          base: ${{ github.ref_name }}
          branch: publish-next-version
          commit-message: Publish v${{ steps.prepare.outputs.version }}
          title: "[AUTO-GENERATED] Publish v${{ steps.prepare.outputs.version }}"
          add-paths: |
            CHANGELOG.md
            loom.config.luau
          body: |
            >[!IMPORTANT]
            > This PR prepares the next release by bumping the version and updating the changelog.
            >
            > **Merging this PR will:**
            >
            > 1. Create and push tag `v${{ steps.prepare.outputs.version }}`
            > 2. Create a GitHub release for that tag and publish it
            > 3. Move the major-version pointer tag (e.g. `v${{ steps.prepare.outputs.version }}` -> `v<major>`) so consumers pinning `@v<major>` pick up the release

            ## Release preview

            Once merged and published, the GitHub release will look like this:

            **Title:** v${{ steps.prepare.outputs.version }} &nbsp;·&nbsp; **Tag:** `v${{ steps.prepare.outputs.version }}`

            ${{ steps.notes.outputs.body }}

            ---

            Next release will be available here:
            ${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ steps.prepare.outputs.version }}

            🤖 This PR was generated by [this run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

      # Debug escape hatch: opens a throwaway PR off the labeled PR's own branch
      # instead of touching `publish-next-version`.
      - name: Open throwaway debug publish PR
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          base: main
          branch: debug-publish-pr-${{ github.event.pull_request.number }}
          commit-message: Publish v${{ steps.prepare.outputs.version }}
          title: "[DEBUG — DO NOT MERGE] Regenerated publish PR for #${{ github.event.pull_request.number }}"
          add-paths: |
            CHANGELOG.md
            loom.config.luau
          # Mirror the real publish PR body exactly so this debug PR previews how
          # the publish PR will render, with a short do-not-merge warning on top.
          body: |
            >[!WARNING]
            > **Debug artifact — do not merge.** Built from the branch of #${{ github.event.pull_request.number }} and pushed to `debug-publish-pr-${{ github.event.pull_request.number }}`, so it can't touch the real `publish-next-version` PR. Close it when you're done.

            >[!IMPORTANT]
            > This PR prepares the next release by bumping the version and updating the changelog.
            >
            > **Merging this PR will:**
            >
            > 1. Create and push tag `v${{ steps.prepare.outputs.version }}`
            > 2. Create a GitHub release for that tag and publish it
            > 3. Move the major-version pointer tag (e.g. `v${{ steps.prepare.outputs.version }}` -> `v<major>`) so consumers pinning `@v<major>` pick up the release

            ## Release preview

            Once merged and published, the GitHub release will look like this:

            **Title:** v${{ steps.prepare.outputs.version }} &nbsp;·&nbsp; **Tag:** `v${{ steps.prepare.outputs.version }}`

            ${{ steps.notes.outputs.body }}

            ---

            Next release will be available here:
            ${{ github.server_url }}/${{ github.repository }}/releases/tag/v${{ steps.prepare.outputs.version }}

            🤖 This PR was generated by [this run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

  move-major-tag:
    # Deploy phase: advance the major-version pointer tag (e.g. `v1`) to the
    # released commit. Runs when a release is published (the publish-release job
    # above fires this via the App token) and, for manual recovery, on a
    # workflow_dispatch that supplies `tag`. Skips prereleases: only stable
    # releases should advance the major pointer.
    if: >-
      (github.event_name == 'release' && !github.event.release.prerelease) ||
      (github.event_name == 'workflow_dispatch' && inputs.tag != '')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Move major version pointer tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
        run: |
          set -euo pipefail

          tag="$RELEASE_TAG"
          if [ -z "$tag" ]; then
            echo "No release tag provided; nothing to do." >&2
            exit 1
          fi

          # Only advance the pointer for vMAJOR.MINOR.PATCH tags.
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag '$tag' is not a vMAJOR.MINOR.PATCH tag; nothing to do."
            exit 0
          fi

          major="${tag%%.*}"            # v1.2.3 -> v1
          sha="$(git rev-list -n 1 "$tag")"

          echo "Pointing $major at $sha (from $tag)"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Force-update the lightweight major tag locally and on origin so it
          # always tracks the latest release for that major version.
          git tag -f "$major" "$sha"
          git push --force origin "refs/tags/$major"
